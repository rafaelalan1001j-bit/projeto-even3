version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ufra_eventos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ufra
      POSTGRES_PASSWORD: ufra2024
      POSTGRES_DB: ufra_eventos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ufra -d ufra_eventos']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
